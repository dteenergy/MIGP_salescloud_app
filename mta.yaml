_schema-version: 3.3.0
ID: salescloud
description: A simple CAP project.
version: 1.0.0
modules:
- name: salescloud-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: salescloud-auth
  - name: postgresql-db
  - name: salescloud-destination-service
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: salescloud-postgres-deployer
  type: nodejs
  path: gen/pg
  properties:
    properties:
    CDS_CONFIG:
        {
          "requires": {
            "db": { 
              "credentials": {
                "schema": "sales_cloud"
              }
            }
          }
        }
  requires:
  - name: postgresql-db
  parameters:
    buildpack: nodejs_buildpack
    no-route: true
    no-start: true
    tasks:
    - command: npm start
      name: deploy-to-postgresql
- name: salescloud-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: salescloud-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - comsapsalescloud.zip
      name: comsapsalescloud
      target-path: resources/
- name: comsapsalescloud
  type: html5
  path: app/salescloud
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: salescloud-destination-content
  type: com.sap.application.content
  requires:
  - name: salescloud-destination-service
    parameters:
      content-target: true
  - name: salescloud-repo-host
    parameters:
      service-key:
        name: salescloud-repo-host-key
  - name: salescloud-auth
    parameters:
      service-key:
        name: salescloud-auth-key
  parameters:
    content:
      instance:
        destinations:
        - Name: salescloudApprouter_salescloud_repo_host
          ServiceInstanceName: salescloud-html5-service
          ServiceKeyName: salescloud-repo-host-key
          sap.cloud.service: salescloudApprouter
        - Authentication: OAuth2UserTokenExchange
          Name: salescloudApprouter_salescloud_auth
          ServiceInstanceName: salescloud-auth
          ServiceKeyName: salescloud-auth-key
          sap.cloud.service: salescloudApprouter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
resources:
- name: salescloud-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      tenant-mode: dedicated
      xsappname: salescloud
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: postgresql-db
  type: org.cloudfoundry.existing-service
  parameters:
    service: postgresql-db
    service-plan: reference
- name: salescloud-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: salescloud-html5-service
    service-plan: app-host
- name: salescloud-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                HTML5.Timeout: 300000
                Name: salesclouddest
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: salescloud-destination-service
    service-plan: lite
  requires:
      - name: srv-api
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production